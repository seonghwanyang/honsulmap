services:
  - type: cron
    name: honsulmap-scraper
    runtime: python
    plan: starter
    schedule: '*/15 * * * *'
    buildCommand: |
      pip install -r worker/requirements.txt
      python -m patchright install chromium
      python -m playwright install chromium
    startCommand: python -m worker.scrape
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: BATCH_SIZE
        value: '15'
      - key: WORKERS
        value: '2'
      - key: PYTHONUNBUFFERED
        value: '1'
      # Render Cron Jobs spin up a fresh container per run, and ~/.cache
      # (the default Playwright/patchright browser cache) is wiped between
      # build and runtime. Redirect the cache into the project tree so the
      # Chromium downloaded during build is still here when scrape.py runs.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
